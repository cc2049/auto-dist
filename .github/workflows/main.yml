name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (只设置 Node，不设置 pnpm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 注意：这里先不要配置 cache，先保证能跑通

      # 3. 【关键步骤】使用官方插件安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          # 这一步会自动把 pnpm 加入到系统路径中，解决找不到命令的问题

      # 4. 安装依赖
      - name: Install Dependencies
        run: pnpm install --ignore-workspace

      # 5. 构建项目
      - name: Build Project
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # 6. 部署到服务器 (这里是你原本的部署脚本，保持不变)
      # - name: Deploy to Server
      #   uses: ...



      # 6. 部署到服务器 (文件上传)
      - name: Deploy Files to Server
        uses: appleboy/scp-action@v0.1.4  # 注意：这里换成了 scp-action
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} # 如果是密钥登录，这里换成 key: ${{ secrets.SERVER_SSH_KEY }}
          
          # 下面是文件传输的核心配置
          source: "dist/*"                      # 本地要上传的文件夹
          target: "/www/wwwroot/8.155.37.232_82" # 服务器目标文件夹
          strip_components: 1                   # 去掉 dist 这一层目录，直接把里面的文件放进去
          rm: true                              # (可选) 上传前先清空目标文件夹，保证是最新的

      # 7. (可选) 如果需要执行重启命令，再单独写一个 SSH 步骤
      - name: Run Remote Commands
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "部署完成！"
            # 这里可以写重启 pm2 或者其他命令 2