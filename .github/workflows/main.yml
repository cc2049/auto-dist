name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (只设置 Node，不设置 pnpm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 注意：这里先不要配置 cache，先保证能跑通

      # 3. 【关键步骤】使用官方插件安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          # 这一步会自动把 pnpm 加入到系统路径中，解决找不到命令的问题

      # 4. 安装依赖
      - name: Install Dependencies
        run: pnpm install --ignore-workspace

      # 5. 构建项目
      - name: Build Project
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # 6. 部署到服务器 (这里是你原本的部署脚本，保持不变)
      # - name: Deploy to Server
      #   uses: ...



      # 6. 部署到服务器 (通过 SSH)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.2
        with:
          # 引用你在 GitHub Secrets 中设置的变量
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          # 如果你是用密码登录，保留下面这行；如果是密钥登录，请删除这行
          password: ${{ secrets.SERVER_PASSWORD }}
          # 如果你是用 SSH Key 登录，请取消下面这行的注释，并删除 password 行
          # key: ${{ secrets.SERVER_SSH_KEY }}

          # 重点检查下面这一行，必须和宝塔里的根目录一模一样
          target: /www/wwwroot/8.155.37.232_82
          # 源文件通常是 dist 文件夹下的所有东西
          source: "dist/*"
          
          # 下面的脚本会在你的服务器上执行
          script: |
            echo "🚀 开始部署..."
            
            # 进入你的网站目录 (请修改为你服务器上的实际路径)
            cd /www/wwwroot/your-project-name
            
            # 拉取最新代码 (如果是 git 部署) 或者覆盖文件
            # 这里假设你是通过 scp 传文件或者 git pull，具体取决于你的策略
            
            # 如果是静态文件，通常 GitHub Action 会把 dist 文件夹传上去
            # 下面是一个简单的重启服务示例 (比如 pm2 或 docker)
            
            # 示例：如果是 Node.js 服务
            # pm2 reload app-name
            
            # 示例：如果是静态网站，通常不需要额外命令，文件覆盖即生效
            echo "✅ 部署完成"